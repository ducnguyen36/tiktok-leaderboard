# ============================================
# Helios Leaderboard — Docker Compose
# App + Cloudflare Tunnel (free, no port forwarding)
# ============================================
#
# SETUP:
# 1. Copy .env.example to .env and fill in your values
# 2. For Cloudflare Quick Tunnel (temporary URL):
#      docker compose up -d
#      docker logs cloudflare-tunnel   # <-- grab the *.trycloudflare.com URL
#
# 3. For Cloudflare Named Tunnel (permanent domain):
#      - Go to https://one.dash.cloudflare.com → Networks → Tunnels
#      - Create a tunnel and copy the token
#      - Set CLOUDFLARE_TUNNEL_TOKEN in your .env
#      - docker compose up -d
# ============================================

services:
  leaderboard:
    build: .
    container_name: helios-leaderboard
    restart: unless-stopped
    ports:
      # Map to 5050 on NAS to avoid Synology DSM port 5000 conflict
      - "${HOST_PORT:-5050}:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - PORT=5000
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    volumes:
      # Persist avatar cache across restarts
      - avatar-cache:/app/avatars
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/api/leaderboard?resetHour=6').then(r=>{if(!r.ok)throw 1;process.exit(0)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ============================================
  # CLOUDFLARE TUNNEL — Free HTTPS access
  # No port forwarding, works behind CGNAT/NAS
  # ============================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    restart: unless-stopped
    depends_on:
      leaderboard:
        condition: service_healthy
    # --- Option A: Quick Tunnel (free, no domain needed) ---
    command: tunnel --no-autoupdate --url http://leaderboard:5000

    # --- Option B: Named Tunnel (requires domain + token in .env) ---
    # command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  avatar-cache:
    driver: local
